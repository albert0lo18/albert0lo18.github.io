        <!-- ===== PANEL DE CONTROLES ===== -->
        <div class="controls-column">

            <div class="titulo">Ocho Reinas</div>

            <!-- Contador -->
            <div class="contador-container">
                Reinas: <span id="num-reinas">0</span> / 8
            </div>

            <!-- Mensaje de estado -->
            <div id="mensaje-victoria"></div>

            <!-- Botón reiniciar -->
            <button class="btn" onclick="reiniciarTablero()">↺ Reiniciar juego</button>

            <!-- SECCIÓN: Selección de imagen de reina (NUEVO) -->
            <div class="seccion">
                <p>Imagen de reina</p>
                <label>
                    <input type="radio" name="imgReina" value="1" checked onchange="cambiarImagenReina(1)">
                    <span class="queen-option">
                        <img src="img/reina.png" class="queen-thumb" alt="Reina 1"> Reina clásica
                    </span>
                </label>
                <label>
                    <input type="radio" name="imgReina" value="2" onchange="cambiarImagenReina(2)">
                    <span class="queen-option">
                        <img src="img/reina-32.png" class="queen-thumb" alt="Reina 2"> Reina fotorealista prendida fuego
                    </span>
                </label>
                <label>
                    <input type="radio" name="imgReina" value="3" onchange="cambiarImagenReina(3)">
                    <span class="queen-option">
                        ♕ Símbolo Unicode
                    </span>
                </label>
            </div>

            <!-- SECCIÓN: Colores del tablero (MEJORADO) -->
            <div class="seccion">
                <p>Colores del tablero</p>
                <div class="color-row">
                    <label for="colorClaro">Casilla clara:</label>
                    <input type="color" id="colorClaro" value="#F5F0E8" onchange="actualizarTablero()">
                </div>
                <div class="color-row">
                    <label for="colorOscuro">Casilla oscura:</label>
                    <input type="color" id="colorOscuro" value="#333333" onchange="actualizarTablero()">
                </div>
            </div>

            <!-- SECCIÓN: Soluciones automáticas (MEJORADO con 3 válidas) -->
            <div class="seccion">
                <p>Soluciones automáticas</p>
                <div class="btn-group">
                    <button class="btn" onclick="ponerSolucion('04752613')">Sol. 1</button>
                    <button class="btn" onclick="ponerSolucion('17346025')">Sol. 2</button>
                    <button class="btn" onclick="ponerSolucion('35720641')">Sol. 3</button>
                </div>
            </div>
